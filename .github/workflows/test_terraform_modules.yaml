name: Terraform modules tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'deployments/**'

jobs:
  terraform-k8s-tests:
    uses: canonical/operator-workflows/.github/workflows/terraform_modules_test.yaml@main
    secrets: inherit
    with:
      k8s-controller: true
      terraform-directories: '["deployments/cos-lite/ps7", "deployments/falcosidekick/ps7"]'
  terraform-lxd-mixed-tests:
    uses: canonical/operator-workflows/.github/workflows/terraform_modules_test.yaml@main
    secrets: inherit
    with:
      lxd-controller-with-k8s-cloud: true
      terraform-directories: '["deployments/falco/ps7", "deployments/lego/ps6", "deployments/opencti/ps6", "deployments/wazuh/ps6"]'
